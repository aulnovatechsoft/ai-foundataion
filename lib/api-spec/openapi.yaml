openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: account
    description: Current user account and profile
  - name: curriculum
    description: 28-day curriculum content
  - name: courses
    description: Tool-based courses (ChatGPT, Claude, Gemini, Midjourney)
  - name: progress
    description: Learning progress and gamification
  - name: achievements
    description: Badges and achievements
  - name: leaderboard
    description: Weekly XP leaderboard
  - name: community
    description: Community feed and public profiles
  - name: certificates
    description: Earned certificates
  - name: projects
    description: User projects
  - name: prompts
    description: Saved prompt library
  - name: openai
    description: OpenAI AI chat operations
  - name: ai
    description: AI utility operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /me:
    get:
      operationId: getMe
      tags: [account]
      summary: Get the current user's profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateMe
      tags: [account]
      summary: Update the current user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MeUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"

  /onboarding/preview:
    post:
      operationId: previewOnboarding
      tags: [onboarding]
      summary: Compute a personalized program from quiz answers (anonymous, no auth)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardingInput"
      responses:
        "200":
          description: Personalized program preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingProgram"
  /onboarding:
    post:
      operationId: saveOnboarding
      tags: [onboarding]
      summary: Persist quiz answers to the signed-in user and return their program
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardingInput"
      responses:
        "200":
          description: Saved user with personalized program
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /payments/order:
    post:
      operationId: createPaymentOrder
      tags: [payments]
      summary: Create a Razorpay order to unlock Days 2-28
      responses:
        "200":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentOrder"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Payments not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /payments/verify:
    post:
      operationId: verifyPayment
      tags: [payments]
      summary: Verify a Razorpay payment signature and unlock full access
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentVerifyInput"
      responses:
        "200":
          description: Payment verified; user unlocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"
        "400":
          description: Invalid signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /payments/webhook:
    post:
      operationId: paymentsWebhook
      tags: [payments]
      summary: Razorpay server-to-server webhook (HMAC-verified, no client auth)
      description: >-
        Called by Razorpay, not by the client. The raw request body (an arbitrary
        Razorpay event payload) is verified against RAZORPAY_WEBHOOK_SECRET before
        any entitlement change. Documented for contract completeness; there is no
        generated client or typed body for this route.
      responses:
        "200":
          description: Webhook acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                required: [received]
        "400":
          description: Invalid or missing signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /curriculum:
    get:
      operationId: listCurriculumDays
      tags: [curriculum]
      summary: List all 28 curriculum days
      responses:
        "200":
          description: Curriculum days
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CurriculumDaySummary"
  /curriculum/{day}:
    get:
      operationId: getCurriculumDay
      tags: [curriculum]
      summary: Get a single curriculum day with its quiz
      parameters:
        - name: day
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Curriculum day detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurriculumDayDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /curriculum/{day}/audio:
    post:
      operationId: generateDayAudio
      tags: [curriculum]
      summary: Generate (or fetch cached) audio deep-dive for a day
      description: Generates a TTS audio deep-dive once per day and caches it; subsequent calls return the cached audio URL.
      parameters:
        - name: day
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Audio ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DayAudio"
        "404":
          description: Curriculum day not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /courses:
    get:
      operationId: listCourses
      tags: [courses]
      summary: List all tool courses with the user's progress
      responses:
        "200":
          description: Courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CourseSummary"
  /courses/{slug}:
    get:
      operationId: getCourse
      tags: [courses]
      summary: Get a course with its units, lessons and the user's progress
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Course detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /courses/lessons/{lessonId}/complete:
    post:
      operationId: completeCourseLesson
      tags: [courses]
      summary: Mark a lesson complete and award XP (idempotent)
      parameters:
        - name: lessonId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Completion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompleteLessonResult"
        "404":
          description: Lesson not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /courses/lessons/{lessonId}/audio:
    post:
      operationId: generateLessonAudio
      tags: [courses]
      summary: Generate (or fetch cached) audio narration for a lesson
      description: Generates TTS narration once per lesson and caches it; subsequent calls return the cached audio URL.
      parameters:
        - name: lessonId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Audio ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LessonAudio"
        "404":
          description: Lesson not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /me/certificate-setup:
    post:
      operationId: saveCertificateSetup
      tags: [account]
      summary: Save the learner's certificate name and first course choice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CertificateSetupInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /progress:
    get:
      operationId: listProgress
      tags: [progress]
      summary: List the current user's progress across all days
      responses:
        "200":
          description: Progress rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DayProgress"
  /progress/{day}:
    get:
      operationId: getDayProgress
      tags: [progress]
      summary: Get the current user's progress for a day
      parameters:
        - name: day
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Day progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DayProgress"
        "404":
          description: Not started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /progress/{day}/lesson:
    post:
      operationId: completeLesson
      tags: [progress]
      summary: Mark the day's lesson complete
      parameters:
        - name: day
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated progress and stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgressUpdate"
  /progress/{day}/task:
    post:
      operationId: completeTask
      tags: [progress]
      summary: Submit the day's task work for structured AI mentor feedback
      parameters:
        - name: day
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskSubmissionInput"
      responses:
        "200":
          description: Structured AI feedback with updated progress and stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskEvalResult"
        "404":
          description: Curriculum day not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /progress/{day}/practice:
    post:
      operationId: submitPractice
      tags: [progress]
      summary: Submit the inline practice exercise for AI grading
      parameters:
        - name: day
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PracticeSubmissionInput"
      responses:
        "200":
          description: Pass/retry result with AI feedback and updated progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PracticeResult"
        "404":
          description: Curriculum day not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /progress/{day}/quiz:
    post:
      operationId: submitQuiz
      tags: [progress]
      summary: Submit quiz answers for the day
      parameters:
        - name: day
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizSubmission"
      responses:
        "200":
          description: Quiz result with updated progress and stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizResult"
  /progress/{day}/reflection:
    post:
      operationId: submitReflection
      tags: [progress]
      summary: Submit a reflection for the day
      parameters:
        - name: day
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReflectionInput"
      responses:
        "200":
          description: Updated progress and stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgressUpdate"

  /achievements:
    get:
      operationId: listAchievements
      tags: [achievements]
      summary: List all achievement definitions with the current user's unlock status
      responses:
        "200":
          description: Achievements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Achievement"

  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get this week's XP leaderboard with the current user's rank
      responses:
        "200":
          description: Weekly leaderboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Leaderboard"

  /users/{id}/profile:
    get:
      operationId: getPublicProfile
      tags: [community]
      summary: Get a user's public profile (only if they opted in)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Public profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicProfile"
        "404":
          description: Not found or profile is private
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /feed:
    get:
      operationId: listFeed
      tags: [community]
      summary: List community feed posts (newest first)
      responses:
        "200":
          description: Feed posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeedPost"
    post:
      operationId: createPost
      tags: [community]
      summary: Share a win or reflection to the community feed
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInput"
      responses:
        "201":
          description: Created post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedPost"
  /feed/{id}:
    delete:
      operationId: deletePost
      tags: [community]
      summary: Delete one of your own posts
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /feed/{id}/like:
    post:
      operationId: likePost
      tags: [community]
      summary: Like a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedPost"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: unlikePost
      tags: [community]
      summary: Remove your like from a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedPost"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /certificates:
    get:
      operationId: listCertificates
      tags: [certificates]
      summary: List the current user's certificates
      responses:
        "200":
          description: Certificates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Certificate"
    post:
      operationId: issueCertificate
      tags: [certificates]
      summary: Issue a certificate to the current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CertificateInput"
      responses:
        "201":
          description: Issued certificate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Certificate"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List the current user's projects
      responses:
        "200":
          description: Projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
  /projects/{id}:
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /prompts:
    get:
      operationId: listPrompts
      tags: [prompts]
      summary: List the current user's saved prompts
      responses:
        "200":
          description: Prompts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Prompt"
    post:
      operationId: createPrompt
      tags: [prompts]
      summary: Save a prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PromptInput"
      responses:
        "201":
          description: Created prompt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prompt"
  /prompts/{id}:
    patch:
      operationId: updatePrompt
      tags: [prompts]
      summary: Update a saved prompt
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PromptUpdate"
      responses:
        "200":
          description: Updated prompt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prompt"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deletePrompt
      tags: [prompts]
      summary: Delete a saved prompt
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"
  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiMessageInput"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}

  /ai/playground:
    post:
      operationId: runPlayground
      tags: [ai]
      summary: Run a one-shot AI completion for the Playground
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaygroundInput"
      responses:
        "200":
          description: Completion output
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaygroundOutput"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Me:
      type: object
      properties:
        id:
          type: integer
        email:
          type: ["string", "null"]
        displayName:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        currentDay:
          type: integer
        xp:
          type: integer
        level:
          type: integer
        streakCount:
          type: integer
        streakFreezes:
          type: integer
        weeklyXp:
          type: integer
        isPublicProfile:
          type: boolean
        hideFromLeaderboard:
          type: boolean
        anonymousMode:
          type: boolean
        emailRemindersEnabled:
          type: boolean
        lastActiveDate:
          type: ["string", "null"]
        theme:
          type: string
        hasPaid:
          type: boolean
        isGrandfathered:
          type: boolean
        hasAccess:
          type: boolean
          description: True if the user can access all 28 days (paid or grandfathered).
        accessibleThroughDay:
          type: integer
          description: Highest day number the user can currently open (1 for free preview, 28 if entitled).
        onboardingCompleted:
          type: boolean
        workContext:
          type: ["string", "null"]
        programTitle:
          type: ["string", "null"]
        programFocus:
          type: ["string", "null"]
        dailyMinutes:
          type: integer
          description: Target minutes the learner wants to spend per day (10, 20, or 40). Drives lesson depth and day-completion requirements.
        field:
          type: ["string", "null"]
          description: The domain the learner wants to apply AI to (e.g. marketing, engineering).
        experienceLevel:
          type: ["string", "null"]
          description: Self-reported AI experience (beginner, some, advanced).
        goal:
          type: ["string", "null"]
        onboardingAnswers:
          type: ["object", "null"]
          additionalProperties:
            type: string
          description: Raw quiz answers (step id -> selected value). Used to personalize the early daily missions toward the learner's first-win focus.
        aspiration:
          type: ["string", "null"]
          description: The learner's selected aspiration answer key from the onboarding quiz, used to personalize paywall copy for returning/authenticated users.
        certificateName:
          type: ["string", "null"]
          description: Name the learner wants printed on course certificates.
        certOnboardingDone:
          type: boolean
          description: True once the learner finished the certificate/course onboarding wizard.
        activeCourseSlug:
          type: ["string", "null"]
          description: Slug of the tool course the learner is currently working through.
        weeklyActivity:
          type: array
          description: Activity for the current Mon–Sun week (7 entries, Monday first). Only populated by GET /me; each entry marks whether the user was active that calendar day.
          items:
            type: object
            properties:
              date:
                type: string
                description: Calendar day in YYYY-MM-DD format (kept as a plain string for exact equality checks).
              active:
                type: boolean
            required:
              - date
              - active
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - currentDay
        - dailyMinutes
        - xp
        - level
        - streakCount
        - streakFreezes
        - weeklyXp
        - isPublicProfile
        - hideFromLeaderboard
        - anonymousMode
        - emailRemindersEnabled
        - theme
        - hasPaid
        - isGrandfathered
        - hasAccess
        - accessibleThroughDay
        - onboardingCompleted
        - createdAt
